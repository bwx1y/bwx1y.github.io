          <img src="../../scr/img/logo.ico" alt="logo" width="30" height="24" class="d-inline-block align-text-top" />
          BWX1Y

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">

      </div>
    </nav>
    <!-- pertanyaan -->
    <form name="submit-to-google-sheet">
      <section>
        <div class="container game">
          <div class="row justify-content-center">
            <div class="col-10">
              <div class="card border-2 border-dark">
                <div class="card-body">
                  <h4 class="card-title text-center">Hi, My Name Nedy</h4>
                  <br />
                  <div class="card-text">
                    <div class="mb-3">
                      <label for="exampleFormControlTextarea1" class="form-label">Pesan Anda :</label>
                      <textarea class="form-control border border-1 border-dark" id="exampleFormControlTextarea1" rows="3" name="Pesan"></textarea>
                    </div>
                    <input type="text" name="Nama" id="nama" value="" class="d-none" placeholder="Janga di rubah" />
                    <input type="submit" value="Kirim" class="btn btn-outline-primary kirim" />
                    <input type="text" name="Ip" id="ip" placeholder="Ip jangan di rubah" class="d-none" value="" />
                    <button class="btn btn-outline-primary d-none Loding" disabled>
                      <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                      <span class="visually-hidden">Loading...</span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </form>

    <!-- script -->
    <script src="../../scr/js/sweetalert2.all.min.js"></script>
    <script src="../../scr/js/bootstrap.bundle.min.js"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/platform/1.3.6/platform.min.js"
      integrity="sha512-eYPrm8TgYWg3aa6tvSRZjN4v0Z9Qx69q3RhfSj+Mf89QqwOMqmwSlsVqfp4N8NVAcZe/YeUhh9x/nM2CAOp6cA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script>
      const scriptURL = "https://script.google.com/macros/s/AKfycbx9nkVKGFgPjUhUKMdmxUxBWEMCRzoYjw-mNWR7nFIWoRBHoQkdT3zWpcZRhXm2Pm3k/exec";
      const form = document.forms["submit-to-google-sheet"];
      const BtnKirim = document.querySelector(".kirim");
      const BtnLoading = document.querySelector(".Loding");
      const Nama = document.querySelector("#nama");
      const Ip = document.querySelector("#ip");
      const user = document.querySelector("#User");
      const Toast = Swal.mixin({
        toast: true,
        position: "top-end",
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true,
        didOpen: (toast) => {
          toast.addEventListener("mouseenter", Swal.stopTimer);
          toast.addEventListener("mouseleave", Swal.resumeTimer);
        },
      });

      $.getJSON("https://api.ipify.org?format=json", function (data) {
        // console.log(data.ip);
        ip.value = data.ip
      });

      form.addEventListener("submit", (e) => {
        nama.value = navigator.userAgent;

        e.preventDefault();
        // tampilka tombol
        BtnLoading.classList.toggle("d-none");
        BtnKirim.classList.toggle("d-none");
        fetch(scriptURL, { method: "POST", body: new FormData(form) })
          .then((response) => {
            BtnLoading.classList.toggle("d-none");
            BtnKirim.classList.toggle("d-none");
            form.reset();
            console.log("Success!");
            Toast.fire({
              icon: "success",
              title: "Your message has been sent",
            });
          })
          .catch((error) => {
            BtnLoading.classList.toggle("d-none");
            BtnKirim.classList.toggle("d-none");
            form.reset();
            console.error("Error!", error.message);
            Toast.fire({
              icon: "error",
              title: "There's a problem trying again",
            });
          });
      });
    </script>
  </body>
</html>
